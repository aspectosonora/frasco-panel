<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FRASCO · Panel de Operación</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0C0D0B; --panel:#14160F; --panel2:#1A1D14; --line:#262A1E;
  --cream:#F0EDE4; --muted:#8E948A; --lime:#8FE231; --lime-deep:#6FAE1F;
  --rojo:#E25B4A; --ambar:#E2B331;
  --disp:'Space Grotesk',sans-serif; --body:'Inter',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--cream);font-family:var(--body);font-size:15px;line-height:1.5;min-height:100vh}
::selection{background:var(--lime);color:#0C0D0B}

/* ---------- header ---------- */
header{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:18px 22px;border-bottom:1px solid var(--line)}
header img{height:30px;display:block}
.hdr-right{text-align:right}
.eyebrow{font-family:var(--disp);font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--lime)}
.hdr-date{font-size:12px;color:var(--muted);margin-top:2px}

/* ---------- nav ---------- */
nav{display:flex;gap:4px;padding:12px 22px;border-bottom:1px solid var(--line);overflow-x:auto;-webkit-overflow-scrolling:touch}
nav button{font-family:var(--disp);font-size:13px;font-weight:500;letter-spacing:.04em;background:none;border:1px solid transparent;color:var(--muted);padding:8px 16px;border-radius:999px;cursor:pointer;white-space:nowrap;transition:.15s}
nav button:hover{color:var(--cream)}
nav button.active{background:var(--lime);color:#0C0D0B;font-weight:600}
nav button:focus-visible,button:focus-visible{outline:2px solid var(--lime);outline-offset:2px}

main{padding:22px;max-width:1100px;margin:0 auto}
section[hidden]{display:none}

h2{font-family:var(--disp);font-size:26px;font-weight:600;letter-spacing:-.01em;margin-bottom:4px}
.sub{color:var(--muted);font-size:13px;margin-bottom:20px}
h3{font-family:var(--disp);font-size:15px;font-weight:600;margin-bottom:10px}

/* ---------- cards / grids ---------- */
.grid{display:grid;gap:14px}
.g2{grid-template-columns:repeat(auto-fit,minmax(280px,1fr))}
.card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px}
.card.accent{border-color:var(--lime-deep)}
.label{font-family:var(--disp);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.big{font-family:var(--disp);font-size:30px;font-weight:700;letter-spacing:-.02em}
.big small{font-size:14px;color:var(--muted);font-weight:400}

/* ---------- chips de estado ---------- */
.chip{display:inline-flex;align-items:center;gap:6px;font-family:var(--disp);font-size:11px;font-weight:600;letter-spacing:.05em;padding:3px 10px;border-radius:999px;border:1px solid var(--line);cursor:pointer;user-select:none;background:var(--panel2);color:var(--muted)}
.chip .dot{width:7px;height:7px;border-radius:50%;background:currentColor}
.chip.idea{color:var(--muted)}
.chip.diseno{color:var(--ambar);border-color:#4a3d14}
.chip.aprobacion{color:#7ec8e3;border-color:#1e3a47}
.chip.publicado{color:var(--lime);border-color:var(--lime-deep)}
.chip.cotizado{color:var(--ambar);border-color:#4a3d14}
.chip.en_curso{color:#7ec8e3;border-color:#1e3a47}
.chip.entregado{color:var(--lime);border-color:var(--lime-deep)}
.chip.pagado{color:#0C0D0B;background:var(--lime);border-color:var(--lime)}
.chip.pendiente{color:var(--ambar);border-color:#4a3d14}
.chip.borrador{color:var(--muted)}
.chip.aprobado{color:#7ec8e3;border-color:#1e3a47}
.chip.grabado{color:var(--lime);border-color:var(--lime-deep)}
.chip.vencido{color:var(--rojo);border-color:#5a241d}

/* ---------- barras ---------- */
.bar{height:8px;background:var(--panel2);border-radius:999px;overflow:hidden;margin-top:8px}
.bar i{display:block;height:100%;background:var(--lime);border-radius:999px;transition:width .4s}

/* ---------- listas ---------- */
.row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 0;border-bottom:1px solid var(--line)}
.row:last-child{border-bottom:none}
.row .meta{font-size:12px;color:var(--muted)}
.client-dot{width:10px;height:10px;border-radius:3px;flex:none}

/* ---------- botones ---------- */
.btn{font-family:var(--disp);font-size:13px;font-weight:600;background:var(--lime);color:#0C0D0B;border:none;padding:9px 18px;border-radius:999px;cursor:pointer;transition:.15s}
.btn:hover{background:#a5f04d}
.btn.ghost{background:none;border:1px solid var(--line);color:var(--cream)}
.btn.ghost:hover{border-color:var(--lime);color:var(--lime)}
.btn.sm{padding:5px 12px;font-size:12px}
.btn:disabled{opacity:.5;cursor:wait}
.iconbtn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:15px;padding:4px}
.iconbtn:hover{color:var(--rojo)}

/* ---------- formularios ---------- */
input,select,textarea{font-family:var(--body);font-size:14px;background:var(--panel2);border:1px solid var(--line);color:var(--cream);border-radius:10px;padding:9px 12px;width:100%}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--lime)}
.field{margin-bottom:12px}
.field label{display:block;font-family:var(--disp);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.frow{display:flex;gap:10px}.frow>.field{flex:1}

/* ---------- modal ---------- */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;padding:20px;z-index:50}
.modal{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:22px;width:100%;max-width:460px;max-height:88vh;overflow-y:auto}
.modal h3{font-size:18px;margin-bottom:16px}

/* ---------- calendario ---------- */
.weekbar{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.weekbar b{font-family:var(--disp);font-size:14px}
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
.cal .day{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:10px;min-height:120px}
.cal .dayhead{font-family:var(--disp);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;display:flex;justify-content:space-between}
.cal .day.today{border-color:var(--lime-deep)}
.post{background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:7px 8px;margin-bottom:6px;font-size:12px;cursor:default}
.post b{display:block;font-weight:600;margin:3px 0 5px}
.post .ptop{display:flex;align-items:center;justify-content:space-between;gap:4px}

/* ---------- ideas ---------- */
.idea-card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:12px}
.idea-card h4{font-family:var(--disp);font-size:15px;margin:6px 0}
.idea-card p{font-size:13px;color:var(--muted)}
.tag{display:inline-block;font-family:var(--disp);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--lime);border:1px solid var(--lime-deep);padding:2px 9px;border-radius:999px}
.spin{display:inline-block;width:14px;height:14px;border:2px solid #0C0D0B;border-top-color:transparent;border-radius:50%;animation:sp .7s linear infinite;vertical-align:-2px;margin-right:6px}
@keyframes sp{to{transform:rotate(360deg)}}
.empty{color:var(--muted);font-size:13px;padding:14px 0}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px;flex-wrap:wrap}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--lime);color:#0C0D0B;font-family:var(--disp);font-weight:600;font-size:13px;padding:10px 20px;border-radius:999px;z-index:99}

@media(max-width:760px){
  .cal{grid-template-columns:1fr}
  .cal .day{min-height:auto}
  main{padding:16px}
  header{padding:14px 16px}
  nav{padding:10px 16px}
}
/* ---------- login ---------- */
#loginScreen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
.login-card{width:100%;max-width:360px;text-align:center}
.login-card img{height:42px;margin-bottom:26px}
.login-card .field{text-align:left}
.login-err{color:var(--rojo);font-size:13px;margin-top:10px;min-height:18px}
.hdr-actions{display:flex;gap:8px;align-items:center}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<header>
  <img id="logo" alt="FRASCO Creative Office">
  <div class="hdr-actions">
    <div class="hdr-right">
      <div class="eyebrow">Panel de operación</div>
      <div class="hdr-date" id="hdrDate"></div>
    </div>
    <button class="btn ghost sm" onclick="openSettings()" aria-label="Ajustes">⚙</button>
    <button class="btn ghost sm" onclick="window.frascoLogout()" aria-label="Salir">Salir</button>
  </div>
</header>
<nav id="nav">
  <button data-v="hoy" class="active">Hoy</button>
  <button data-v="clientes">Clientes</button>
  <button data-v="calendario">Calendario</button>
  <button data-v="guiones">Guiones</button>
  <button data-v="cobros">Cobros</button>
  <button data-v="numeros">Números</button>
  <button data-v="proyectos">Proyectos</button>
  <button data-v="ideas">Ideas IA</button>
</nav>
<main>
  <section id="v-hoy"></section>
  <section id="v-clientes" hidden></section>
  <section id="v-calendario" hidden></section>
  <section id="v-guiones" hidden></section>
  <section id="v-cobros" hidden></section>
  <section id="v-numeros" hidden></section>
  <section id="v-proyectos" hidden></section>
  <section id="v-ideas" hidden></section>
</main>
<div id="modalRoot"></div>
<div id="loginScreen">
  <div class="login-card">
    <img id="logoLogin" alt="FRASCO Creative Office">
    <div class="eyebrow" style="margin-bottom:18px">Panel de operación</div>
    <div class="field"><label>Correo</label><input id="lg_email" type="email" autocomplete="username"></div>
    <div class="field"><label>Contraseña</label><input id="lg_pass" type="password" autocomplete="current-password"></div>
    <button class="btn" style="width:100%" id="lg_btn">Entrar</button>
    <div class="login-err" id="lg_err"></div>
  </div>
</div>

function durOf(p){return p.dur||(p.tipo==='Reel'?2:1);}
function realOf(p){return p.real!=null?p.real:durOf(p);}
function mesDeSemana(week){return week.slice(0,7);}
function fmtHora(h){return h<12?h+':00 am':h===12?'12:00 pm':(h-12)+':00 pm';}
const COLORS=['#8FE231','#E2B331','#7EC8E3','#E25B4A','#C77EE3','#5BE2B0','#E37E9E'];

let S=null; // estado global
const uid=()=>Math.random().toString(36).slice(2,9);

function seed(){
  let seedI=0;
  const mk=(n,g,p,w,redes,cobro)=>{
    const base={id:uid(),nombre:n,giro:g,color:COLORS[seedI++%COLORS.length],paquete:'Personalizado',precio:p,posts:w,redes,cobro,notas:''};
    if(cobro==='quincenal'){base.pagoQ1='pendiente';base.pagoQ2='pendiente';}else{base.pago='pendiente';}
    return base;
  };
  const clients=[
    mk('Mariko Music Center','Tienda de instrumentos musicales',7500,5,'IG · FB','inicio'),
    mk('JMT Guitars','Marca de guitarras e instrumentos',4800,3,'IG · FB · TikTok','inicio'),
    mk('Academia Mariko Music School','Academia de música',4200,3,'IG · FB','quincenal'),
    mk('Inter Soluciones','Soluciones industriales B2B',4200,3,'FB · LinkedIn','dia15'),
    mk('Dr. Carlos Adame','Cirugía plástica y estética · Hermosillo',3600,3,'IG · FB','fin'),
    mk('Dr. Fernando Adame','Psiquiatría',3600,3,'IG · FB','quincenal'),
    mk('Vortex','Experiencias y eventos',3500,3,'IG · TikTok','inicio'),
    mk('The Capital Salad','Restaurante saludable',3000,2,'IG · FB','quincenal'),
    mk('Instituto Washington','Escuela bilingüe',2500,3,'IG · FB','inicio'),
    mk('CANACO · Mariko Tamaura','Posicionamiento institucional',2000,2,'IG · FB · LinkedIn','inicio')
  ];
  return {clients,posts:[],projects:[],reminders:[],blocks:[],settings:{apiKey:'',asistente:{nombre:'',email:''}},cobrosPagados:{}};
}
async function load(){
  try{const r=await window.storage.get(KEY); S=JSON.parse(r.value);}
  catch(e){S=seed(); save();}
  if(!S||!S.clients){S=seed(); save();}
  // migración suave de versiones anteriores
  S.cobrosPagados=S.cobrosPagados||{};
  S.guiones=S.guiones||[];
  S.settings=S.settings||{};
  S.settings.asistente=S.settings.asistente||{nombre:'',email:''};
  S.posts.forEach(p=>{if(!p.quien)p.quien='Julio';});
}
let saveT=null;
function save(){
  clearTimeout(saveT);
  saveT=setTimeout(async()=>{
    try{await window.storage.set(KEY,JSON.stringify(S));}
    catch(e){console.error('No se pudo guardar',e);}
  },300);
}

/* ================= UTILS ================= */
function getMonday(d){d=new Date(d);const day=(d.getDay()+6)%7;d.setDate(d.getDate()-day);d.setHours(0,0,0,0);return d;}
function iso(d){return d.toISOString().slice(0,10);}
function fmtMoney(n){return '$'+Number(n||0).toLocaleString('es-MX');}
function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function client(id){return S.clients.find(c=>c.id===id);}
function cobrosDeMes(ym){
  const[y,m]=ym.split('-').map(Number);
  const finMes=new Date(y,m,0).getDate();
  const out=[];
  S.clients.forEach(cl=>{
    const push=(day,monto,corta,suf)=>out.push({key:cl.id+':'+suf,clientId:cl.id,dia:day,fecha:new Date(y,m-1,day),monto,corta,nombre:cl.nombre,color:cl.color});
    if(cl.cobro==='inicio')push(1,cl.precio,'Mes','m');
    else if(cl.cobro==='dia15')push(15,cl.precio,'Día 15','m');
    else if(cl.cobro==='fin')push(finMes,cl.precio,'Fin de mes','m');
    else if(cl.cobro==='quincenal'){push(15,cl.precio/2,'1ª QNA','q1');push(finMes,cl.precio/2,'2ª QNA','q2');}
  });
  out.sort((a,b)=>a.dia-b.dia||b.monto-a.monto);
  return out;
}
function cobroPagado(ym,key){return (S.cobrosPagados[ym]||[]).includes(key);}
function toggleCobro(ym,key){
  S.cobrosPagados[ym]=S.cobrosPagados[ym]||[];
  const a=S.cobrosPagados[ym];const i=a.indexOf(key);
  i>=0?a.splice(i,1):a.push(key);
  save();render();
}
function pagoChips(cl){
  const ym=ymNow();const hoy=new Date();
  return cobrosDeMes(ym).filter(x=>x.clientId===cl.id).map(x=>{
    const ok=cobroPagado(ym,x.key);const venc=!ok&&x.fecha<hoy;
    return `<span class="chip ${ok?'pagado':venc?'vencido':'pendiente'}" onclick="toggleCobro('${ym}','${x.key}')"><span class="dot"></span>${x.corta}</span>`;
  }).join('');
}
function toast(msg){const t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2200);}

function isAsst(){
  return !!(S&&S.settings&&S.settings.asistente&&S.settings.asistente.email&&window.frascoEmail&&window.frascoEmail.toLowerCase()===S.settings.asistente.email.toLowerCase());
}
function applyRole(){
  const ocultar=['clientes','cobros','proyectos','numeros'];
  document.querySelectorAll('nav button').forEach(b=>{
    if(ocultar.includes(b.dataset.v))b.style.display=isAsst()?'none':'';
  });
  document.querySelectorAll('.hdr-actions .btn')[0].style.display=isAsst()?'none':'';
}
/* ================= NAV ================= */
let view='hoy', weekStart=getMonday(new Date());
document.getElementById('nav').addEventListener('click',e=>{
  const b=e.target.closest('button'); if(!b)return;
  document.querySelectorAll('nav button').forEach(x=>x.classList.toggle('active',x===b));
  view=b.dataset.v;
  document.querySelectorAll('main section').forEach(s=>s.hidden=true);
  document.getElementById('v-'+view).hidden=false;
  render();
});
function render(){
  applyRole();
  if(isAsst()&&['clientes','cobros','proyectos','numeros'].includes(view)){view='hoy';document.querySelectorAll('main section').forEach(s=>s.hidden=true);document.getElementById('v-hoy').hidden=false;document.querySelectorAll('nav button').forEach(x=>x.classList.toggle('active',x.dataset.v==='hoy'));}
  if(view==='hoy')rHoy();
  if(view==='clientes')rClientes();
  if(view==='calendario')rCal();
  if(view==='guiones')rGuiones();
  if(view==='cobros')rCobros();
  if(view==='numeros')rNumeros();
  if(view==='proyectos')rProy();
  if(view==='ideas')rIdeas();
}

function toggleBlock(id){const b=S.blocks.find(x=>x.id===id);b.done=!b.done;save();rHoy();}
function delBlock(id){S.blocks=S.blocks.filter(x=>x.id!==id);save();rHoy();}
function addRem(){const t=document.getElementById('remTxt').value.trim();if(!t)return;S.reminders.push({id:uid(),texto:t,done:false});save();rHoy();}
function toggleRem(id){const r=S.reminders.find(x=>x.id===id);r.done=!r.done;save();rHoy();}
function delRem(id){S.reminders=S.reminders.filter(x=>x.id!==id);save();rHoy();}

function paqAuto(){
  const p=document.getElementById('m_paquete').value;
  const precio=document.getElementById('m_precio');
  const posts=document.getElementById('m_posts');
  if(p==='Básico'){precio.value=4400;posts.value=3;}
  if(p==='Pro'){precio.value=6300;posts.value=5;}
}
function saveClient(id){
  const v=k=>document.getElementById('m_'+k).value;
  if(!v('nombre').trim()){toast('Falta el nombre');return;}
  if(id){const c=client(id);const cob=v('cobro');Object.assign(c,{nombre:v('nombre'),giro:v('giro'),paquete:v('paquete'),precio:+v('precio')||0,posts:+v('posts')||0,cobro:cob,redes:v('redes'),drive:v('drive'),notas:v('notas')});
    if(cob==='quincenal'){c.pagoQ1=c.pagoQ1||'pendiente';c.pagoQ2=c.pagoQ2||'pendiente';}else{c.pago=c.pago||'pendiente';}}
  else{const cob=v('cobro');const nc={id:uid(),nombre:v('nombre'),giro:v('giro'),color:COLORS[S.clients.length%COLORS.length],paquete:v('paquete'),precio:+v('precio')||0,posts:+v('posts')||0,cobro:cob,redes:v('redes'),drive:v('drive'),notas:v('notas')};

        <div class="dayhead"><span>${d}</span><span>${posts.length||''}</span></div>

          <div class="post" style="${p.estado==='publicado'?'opacity:.5':''}">
            <div class="ptop"><span style="display:flex;gap:6px;align-items:center"><span class="client-dot" style="background:${c?c.color:'#555'}"></span>
            <button class="iconbtn" style="font-size:13px;padding:0;color:${p.estado==='publicado'?'var(--lime)':'var(--muted)'}" onclick="toggleDone('${p.id}')" aria-label="Marcar lista">✓</button>${p.estado==='publicado'?`<button class="iconbtn" style="font-size:11px;padding:0" onclick="openTiempoModal('${p.id}')" aria-label="Tiempo real">⏱${realOf(p)}h</button>`:''}</span>
            <button class="iconbtn" style="font-size:13px;padding:0" onclick="delPost('${p.id}')" aria-label="Eliminar">×</button></div>
            <b style="${p.estado==='publicado'?'text-decoration:line-through':''}">${esc(p.titulo)}</b>
            <div class="meta" style="margin-bottom:5px">${p.hora!=null?'<b style=\'color:var(--lime)\'>'+fmtHora(p.hora)+'</b> · ':''}${c?esc(c.nombre):''} · ${esc(p.tipo)} · ${durOf(p)}h${p.quien&&p.quien!=='Julio'?' · 👤'+esc(p.quien):''}</div>
            ${p.diaPub!=null?`<div class="meta" style="margin-bottom:5px;color:${p.hora!=null&&p.dia>p.diaPub?'var(--ambar)':'var(--muted)'}">📤 Publica ${DIAS[p.diaPub]}</div>`:''}
            <span class="chip ${p.estado}" onclick="cyclePost('${p.id}')"><span class="dot"></span>${POST_LABELS[p.estado]}</span>
            ${(g=>g?`<button class="btn ghost sm" style="margin-top:6px;width:100%" onclick="openGuionVer('${g.id}')">📜 Guion</button>`:'')(S.guiones.find(g=>g.postId===p.id))}
          </div>`;}).join('')}
      </div>`;}).join('')}

}
function planSemana(){
  const wk=iso(weekStart);
  const hoy=new Date();const esActual=iso(getMonday(hoy))===wk;
  const desde=esActual?Math.min((hoy.getDay()+6)%7,6):0;
  const pubDays=[0,2,4,1,3];
  S.clients.forEach((cl,ci)=>{
    const existentes=S.posts.filter(p=>p.clientId===cl.id&&p.week===wk);
    let faltan=Math.max(0,(cl.posts||0)-existentes.length);
    let pi=existentes.length;
    const tieneReel=existentes.some(p=>p.tipo==='Reel');
    if(!tieneReel&&faltan>0){
      S.posts.push({id:uid(),clientId:cl.id,week:wk,dia:0,hora:null,diaPub:pubDays[(pi+ci)%5],titulo:'Reel semanal · definir tema',tipo:'Reel',estado:'idea',quien:'Julio'});
      pi++;faltan--;
    }
    for(let i=0;i<faltan;i++){
      S.posts.push({id:uid(),clientId:cl.id,week:wk,dia:0,hora:null,diaPub:pubDays[(pi+ci)%5],titulo:'Post · definir tema',tipo:'Diseño',estado:'idea',quien:'Julio'});
      pi++;
    }
  });
  const tareas=S.posts.filter(p=>p.week===wk&&p.estado!=='publicado');
  asignarHoras(tareas,desde,wk);
  save();render();
  const sinHora=tareas.filter(p=>p.hora==null).length;
  toast(sinHora?`Semana planeada · ${sinHora} sin espacio`:'Semana planeada ✓');
}
function asignarHoras(tareas,desde,wk){
  const libre=[0,1,2,3,4,5].map(d=>d<desde?[]:[...horasDe(d)]);
  // respetar horas ya ocupadas por tareas que no se mueven
  S.posts.filter(p=>p.week===wk&&p.hora!=null&&!tareas.includes(p)).forEach(p=>{
    if(p.dia>=desde&&p.dia<=5){const arr=libre[p.dia];for(let h=p.hora;h<p.hora+durOf(p);h++){const i=arr.indexOf(h);if(i>=0)arr.splice(i,1);}}
  });
  const carga=[0,0,0,0,0,0],porDia=[{},{},{},{},{},{}],reelDia=[0,0,0,0,0,0];
  tareas.sort((a,b)=>durOf(b)-durOf(a)||(a.diaPub??9)-(b.diaPub??9));
  tareas.forEach(p=>{
    const d=durOf(p);
    let mejor=-1,mejorScore=1e9,mejorIdx=-1;
    for(let day=desde;day<6;day++){
      const horas=libre[day];let idx=-1;
      for(let i=0;i<horas.length;i++){
        if(d===1){idx=i;break;}
        if(d===2&&i<horas.length-1&&horas[i+1]===horas[i]+1){idx=i;break;}
      }
      if(idx<0)continue;
      let score=carga[day]*(p.tipo==='Reel'?4:10)+horas[idx]*0.1;
      if(p.tipo==='Reel'){if(reelDia[day])score-=8;if(day===5)score-=6;} // lotes: agrupar grabaciones, sábado preferente
      else if(porDia[day][p.clientId])score+=5;
      if(p.diaPub!=null&&day>p.diaPub)score+=25; // producir después de publicar: castigo
      if(score<mejorScore){mejorScore=score;mejor=day;mejorIdx=idx;}
    }
    if(mejor<0){p.hora=null;return;}
    p.dia=mejor;p.hora=libre[mejor][mejorIdx];
    libre[mejor].splice(mejorIdx,d===2?2:1);
    carga[mejor]+=d;porDia[mejor][p.clientId]=true;if(p.tipo==='Reel')reelDia[mejor]++;
  });
}
function reacomodar(){
  const hoy=new Date();const wk=iso(getMonday(hoy));const d=(hoy.getDay()+6)%7;
  const items=S.posts.filter(p=>p.week===wk&&p.estado!=='publicado'&&p.hora!=null&&p.dia<=d);
  if(!items.length){toast('Nada pendiente que reacomodar');return;}
  if(d>=5){toast('La semana ya cerró: usa ⚡ Planear en la semana próxima');return;}
  asignarHoras(items,d+1,wk);
  save();render();toast('Pendientes reacomodados hacia adelante ✓');
}

function rNumeros(){

  const semana=S.posts.filter(p=>p.week===wk&&p.hora!=null);

  const filas=[{n:'Julio',h:horasDe2('Julio'),cap:capJulio}];

        <b style="font-family:var(--disp);min-width:110px;text-align:right">${f.h}h <small style="color:var(--muted);font-weight:400">/ ${f.cap}h</small></b>
      </div>`).join('')}

    ${rent.map(x=>`

        <div style="display:flex;gap:10px;align-items:center"><span class="client-dot" style="background:${x.cl.color}"></span>
        <div><div>${esc(x.cl.nombre)}</div><div class="meta">${fmtMoney(x.cl.precio)}/mes · ${x.horas}h invertidas</div></div></div>
        <b style="font-family:var(--disp);color:${x.ph==null?'var(--muted)':x.ph>=500?'var(--lime)':x.ph>=300?'var(--cream)':'var(--ambar)'}">${x.ph==null?'—':fmtMoney(Math.round(x.ph))+'/h'}</b>

      if(!data.clients||!Array.isArray(data.clients))throw 0;
      if(!confirm('Esto reemplaza TODOS los datos actuales con el respaldo. ¿Continuar?'))return;
      S=data;save();closeModal();render();toast('Respaldo restaurado ✓');

const db = getFirestore(app);

// adaptador: misma interfaz que el prototipo, pero sobre Firestore
window.storage = {
  async get(key){
    const s = await getDoc(doc(db,'panel',key));
    if(!s.exists()) throw new Error('sin datos');
    return {value: s.data().json};
  },
  async set(key,val){
    await setDoc(doc(db,'panel',key),{json:val,updated:Date.now()});
    return {key};
  }
};
window.frascoLogout = ()=>signOut(auth).then(()=>location.reload());

const lg = document.getElementById('loginScreen');
onAuthStateChanged(auth,(user)=>{
  if(user){
    lg.style.display='none';
    window.dispatchEvent(new Event('frasco-ready'));
  } else {
    lg.style.display='flex';
  }
});
async function doLogin(){
  const err=document.getElementById('lg_err');
  err.textContent='';
  try{
    await signInWithEmailAndPassword(auth,
      document.getElementById('lg_email').value.trim(),
      document.getElementById('lg_pass').value);
  }catch(e){
    err.textContent = e.code==='auth/invalid-credential' ? 'Correo o contraseña incorrectos.' : 'No se pudo iniciar sesión. Revisa tu conexión.';
  }
}
document.getElementById('lg_btn').addEventListener('click',doLogin);
document.getElementById('lg_pass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
</script>
